- title: "Attack on Titan"
  stars: 5
  note: "One of the best stories ever told in any medium. The ending divides people. I understand why."
- title: "Fullmetal Alchemist: Brotherhood"
  stars: 5
  note: "Close to perfect. The pacing, the themes, the payoff. Textbook anime."
- title: "Hunter x Hunter"
  stars: 5
  note: "Chimera Ant arc changed how I think about storytelling. Nothing else like it."
- title: "Demon Slayer"
  stars: 4
  note: "Stunning animation. The story is straightforward but the craft is undeniable."
- title: "Jujutsu Kaisen"
  stars: 4
  note: "Stylish and brutal. Gojo carried the first season and then some."
- title: "Vinland Saga"
  stars: 5
  note: "Surprisingly deep. Started as a revenge story and became something much more important."
- title: "Neon Genesis Evangelion"
  stars: 4
  note: "Difficult and strange and worth every confusing minute."
- title: "Cowboy Bebop"
  stars: 5
  note: "Style and soul. The jazz, the loneliness, the ending. A classic for a reason."
- title: "Death Note"
  stars: 4
  note: "First two thirds are some of the best television I have watched. You know what happened after."
- title: "Your Lie in April"
  stars: 4
  note: "I was not prepared. Nobody ever is."
