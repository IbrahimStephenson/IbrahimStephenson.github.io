# HOW TO ADD BOOKS
# To add a read book, add an entry under "shelf:" like this:
#   - title: "Book Title"
#     author: "Author Name"
#     color: "#4a6fa5"
#     h: 200
#     w: 40
#     note: "Your one line take on it."
# To add a TBR book, add an entry under "tbr:" like this:
#   - title: "Book Title"
#     author: "Author Name"
#     color: "#3a5a7a"
#     h: 190
#     w: 38
#     note: "Why it is on your list."
# Save the file and push to deploy.

shelf:
  - title: "The Way of Kings"
    author: "Brandon Sanderson"
    color: "#4a6fa5"
    h: 213
    w: 44
    note: "The book that got me into fantasy. Sanderson builds a world unlike anything else."
  - title: "Words of Radiance"
    author: "Brandon Sanderson"
    color: "#6272a8"
    h: 206
    w: 46
    note: "Better than the first. Shallan's arc is underrated."
  - title: "Oathbringer"
    author: "Brandon Sanderson"
    color: "#8b5e8e"
    h: 220
    w: 48
    note: "Slow in the middle but the ending earns everything."
  - title: "Rhythm of War"
    author: "Brandon Sanderson"
    color: "#7b8b5e"
    h: 216
    w: 46
    note: "Divisive but I liked it. The mental health themes hit differently."
  - title: "The Final Empire"
    author: "Brandon Sanderson"
    color: "#5e7b8b"
    h: 193
    w: 39
    note: "Mistborn at its best. The magic system is genius."
  - title: "The Well of Ascension"
    author: "Brandon Sanderson"
    color: "#5e8b6b"
    h: 187
    w: 39
    note: "Slower but necessary. Sets up the finale perfectly."
  - title: "The Hero of Ages"
    author: "Brandon Sanderson"
    color: "#8b6b5e"
    h: 181
    w: 37
    note: "One of the best trilogy endings I have read."
  - title: "Red Rising"
    author: "Pierce Brown"
    color: "#b83c3c"
    h: 176
    w: 34
    note: "Did not expect to be this gripped. Darrow is a great protagonist."
  - title: "Golden Son"
    author: "Pierce Brown"
    color: "#b8743c"
    h: 173
    w: 34
    note: "Bigger in every way. The political complexity kicks in here."
  - title: "Morning Star"
    author: "Pierce Brown"
    color: "#c8a040"
    h: 168
    w: 34
    note: "Earns every moment. The payoff is real."

tbr:
  - title: "The Winds of Winter"
    author: "George R.R. Martin"
    color: "#3d4f63"
    h: 198
    w: 41
    note: "It has to come out eventually. I will be ready."
  - title: "Assassin's Apprentice"
    author: "Robin Hobb"
    color: "#4e5a60"
    h: 176
    w: 34
    note: "Everyone I trust says this is essential."
  - title: "The Name of the Wind"
    author: "Patrick Rothfuss"
    color: "#5a4848"
    h: 181
    w: 37
    note: "Been meaning to start this for two years. The pile grows."
